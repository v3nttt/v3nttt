<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>v3nttt | finds</title>
    <style>
        /* CSS - Estetyka: Minimalizm / New Wave / Technical */
        body {
            background-color: #050505;
            color: #fff;
            font-family: 'Helvetica', Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-transform: lowercase; /* Styl małych liter jak u j3ziorrr */
        }

        /* POPUP / OKNO POWITALNE */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #popup {
            background: #0d0d0d;
            padding: 45px 35px;
            border: 1px solid #222;
            text-align: center;
            max-width: 400px;
            width: 85%;
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        /* Przycisk zamykania X */
        .close-x {
            position: absolute;
            top: 15px;
            right: 20px;
            color: #444;
            font-size: 28px;
            cursor: pointer;
            line-height: 1;
            transition: 0.2s;
        }
        .close-x:hover { color: #fff; }

        #popup h2 { font-size: 24px; margin: 0 0 10px 0; letter-spacing: -1px; }
        #popup p { color: #777; font-size: 13px; margin-bottom: 25px; }
        
        /* Ramka z promocją */
        .promo-box {
            background: #111;
            padding: 20px;
            border: 1px solid #1a1a1a;
            margin-bottom: 25px;
        }
        .promo-box b { display: block; color: #fff; font-size: 17px; margin-bottom: 8px; }
        .promo-box span { color: #888; font-size: 13px; }
        .highlight-code { color: #fff; font-weight: bold; border-bottom: 1px dashed #555; }

        .aff-btn {
            display: block;
            background: #fff;
            color: #000;
            padding: 16px;
            text-decoration: none;
            font-weight: bold;
            font-size: 13px;
            transition: 0.3s;
        }
        .aff-btn:hover { background: #ddd; transform: translateY(-2px); }

        /* NAWIGACJA */
        nav {
            display: flex;
            justify-content: center;
            padding: 25px;
            border-bottom: 1px solid #111;
            gap: 30px;
            background: #050505;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        nav a { color: #555; text-decoration: none; font-size: 12px; font-weight: 500; transition: 0.3s; }
        nav a:hover { color: #fff; }

        /* LISTA PRODUKTÓW */
        .container {
            max-width: 700px;
            margin: 60px auto;
            padding: 0 25px;
        }
        .section-header {
            font-size: 13px;
            color: #444;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }
        .product-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .product-item {
            display: flex;
            align-items: center;
            background: #0a0a0a;
            border: 1px solid #111;
            padding: 12px;
            text-decoration: none;
            color: #fff;
            transition: 0.2s;
        }
        .product-item:hover { border-color: #333; background: #0f0f0f; }
        
        .product-item img {
            width: 65px;
            height: 65px;
            object-fit: cover;
            margin-right: 20px;
            border: 1px solid #1a1a1a;
        }
        .product-info { flex-grow: 1; }
        .product-info .name { display: block; font-size: 14px; margin-bottom: 4px; color: #eee; }
        .product-info .price { color: #555; font-size: 11px; }
        
        .buy-arrow { color: #222; font-size: 18px; padding-right: 5px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="overlay">
    <div id="popup">
        <div class="close-x" onclick="closePopup()">×</div>
        <h2>Zgarnij swoje bonusy! </h2>
        <p>odbierz kupony dla nowych użytkowników</p>
        
        <div class="promo-box">
            <b>$410 bonus w kuponach</b>
            <span>użyj kodu: <span class="highlight-code">lucky8</span> (-$15 wysyłka)</span>
        </div>
        
        <a href="https://ikako.vip/r/nlyhaulss" class="aff-btn" target="_blank">odbierz kupony na kakobuy</a>
    </div>
</div>

<nav>
    <a href="#finds">linki z tiktoka</a>
    <a href="https://www.tiktok.com/@twinfashion0" target="_blank">tiktok</a>
    <a href="https://www.youtube.com/@v3nttt3" target="_blank">youtube</a>
</nav>

<div class="container" id="finds">
    <div class="section-header">/ Linki z filmików </div>
    
    <div class="product-list">
        
        <a href="https://ikako.vip/9dk75" class="product-item" target="_blank">
            <img src="foliopaki.jpg" alt="foliopaki">
            <div class="product-info">
                <span class="name">foliopaki (shipping essentials)</span>
                <span class="price">CNY ￥2.87 ≈ zł 1.64</span>
            </div>
            <div class="buy-arrow">→</div>
        </a>

        </div>
</div>

<script>
    // Funkcja zamykająca popup
    function closePopup() {
        var overlay = document.getElementById('overlay');
        overlay.classList.add('hidden');
    }
</script>

</body>
</html>
